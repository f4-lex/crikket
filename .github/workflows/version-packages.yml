name: Version Packages

# Manual-only in this fork: we do not publish to npm (the @crikket-io/capture
# package name belongs to upstream) and consume the SDK via a local tarball
# instead. Left dispatchable in case the upstream release flow is ever needed.
on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: version-packages
  cancel-in-progress: true

jobs:
  version:
    runs-on: ubuntu-latest
    # The release commit runs through husky's pre-commit hook, which builds the
    # whole monorepo and fails on apps/web without its NEXT_PUBLIC_* env. Skip
    # git hooks for the whole job: this is an automated version bump, and the
    # real checks run as their own CI jobs.
    env:
      HUSKY: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Create release PR
        uses: changesets/action@v1
        with:
          version: bun run changeset:version
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
